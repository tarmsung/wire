# Minimal coturn config for Wire (OPTIONAL — only if self-hosting TURN).
# Install coturn, put this at /etc/turnserver.conf, set ENABLED=1 in
# /etc/default/coturn, then: sudo systemctl enable --now coturn
#
# Firewall: open 3478/udp, 3478/tcp, 5349/tcp (TLS), and the relay UDP range
# 49152-65535/udp. Replace YOUR.SERVER.IP with the VPS public IP.

listening-port=3478
tls-listening-port=5349

# The VPS's public IP (external-ip=PUBLIC or external-ip=PUBLIC/PRIVATE behind NAT)
external-ip=YOUR.SERVER.IP

# Relay port range (must be open in the firewall)
min-port=49152
max-port=65535

# Simple long-term credentials. Must match the TURN_USERNAME / TURN_CREDENTIAL
# env vars given to the Wire server (deploy/wire.service).
lt-cred-mech
user=wire:change-me
realm=wirelink.online

# Reuse Caddy's Let's Encrypt cert for TURNS (turns:...:5349). After Caddy has
# issued the cert, point these at the copies in its data dir (paths vary).
# cert=/var/lib/caddy/.../wirelink.online.crt
# pkey=/var/lib/caddy/.../wirelink.online.key

# Lock it down a bit
no-cli
no-multicast-peers
